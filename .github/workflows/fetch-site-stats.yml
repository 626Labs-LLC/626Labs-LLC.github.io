name: Fetch site stats (GoatCounter)

# Pulls 626labs.dev visit stats from the GoatCounter API and commits a
# 30-day snapshot to data/site-stats.json. The admin Analytics panel
# reads this JSON via the Contents API — we don't hit GoatCounter from
# the browser because (a) /stats/hits fails CORS preflight, and
# (b) the free-tier API rate-limits aggressively.

on:
  schedule:
    # 06:30 UTC daily — 30 minutes after the plugin-repo traffic job so
    # we don't slam GitHub Actions runners at the same minute.
    - cron: '30 6 * * *'
  workflow_dispatch:

concurrency:
  group: fetch-site-stats
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    # Don't re-trigger on our own bot commits.
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch site stats
        env:
          GOATCOUNTER_TOKEN: ${{ secrets.GOATCOUNTER_TOKEN }}
        run: node scripts/fetch-site-stats.mjs

      - name: Commit + push if changed
        run: |
          if [[ -z "$(git status --porcelain data/site-stats.json)" ]]; then
            echo "No site-stats drift."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/site-stats.json
          git commit -m "site-stats: snapshot $(date -u +%Y-%m-%d)"
          # Retry push — another bot job (build-widget, refresh-bacon-shards,
          # rebuild-hub, track-traffic) may have pushed first while we were
          # fetching.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected on attempt $attempt; rebasing onto remote main and retrying..."
            git pull --rebase origin main
            sleep $((attempt * 3))
          done
          echo "::error::Failed to push after 5 attempts."
          exit 1
