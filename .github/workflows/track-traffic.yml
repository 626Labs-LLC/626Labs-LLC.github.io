name: Track plugin traffic

on:
  schedule:
    # Daily at 06:00 UTC (01:00 CST / 02:00 CDT) — after GitHub finalizes
    # the previous day's traffic counts.
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: track-traffic
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    # Don't re-trigger on our own bot commits.
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch traffic snapshots
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_PAT }}
        run: node scripts/track-traffic.mjs

      - name: Commit if changed
        run: |
          if [[ -z "$(git status --porcelain data/traffic.csv)" ]]; then
            echo "No traffic changes."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/traffic.csv
          git commit -m "traffic: daily snapshot $(date -u +%Y-%m-%d)"
          # Retry push — another bot job (build-widget, refresh-bacon-shards,
          # rebuild-hub) may have pushed first while we were fetching traffic.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected on attempt $attempt; rebasing onto remote main and retrying..."
            git pull --rebase origin main
            sleep $((attempt * 3))
          done
          echo "::error::Failed to push after 5 attempts."
          exit 1
