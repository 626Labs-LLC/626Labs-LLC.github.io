name: Build Widget (bacon-trail)

# Rebuilds the embedded Birthday Bacon Trail widget whenever its source,
# Vite config, package.json, or this workflow changes. The build bakes
# VITE_TMDB_API_KEY into the IIFE bundle from the repo secret so the
# live widget on 626labs.dev never ships an empty key. Result bundle
# (widget.js + widget.css + sourcemap + copied data/birthdays/) is
# committed back to `widget-bacon-trail/` at the hub root so GitHub
# Pages picks it up on the next deploy.

on:
  push:
    branches: [main]
    paths:
      - 'apps/widget-bacon-trail/src/**'
      - 'apps/widget-bacon-trail/package.json'
      - 'apps/widget-bacon-trail/package-lock.json'
      - 'apps/widget-bacon-trail/vite.config.ts'
      - 'apps/widget-bacon-trail/postcss.config.js'
      - 'apps/widget-bacon-trail/tsconfig.json'
      - '.github/workflows/build-widget.yml'
  workflow_dispatch:

concurrency:
  group: build-widget
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Don't re-trigger when our own bot commits the rebuilt bundle.
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/widget-bacon-trail/package-lock.json

      - name: Install dependencies
        working-directory: apps/widget-bacon-trail
        run: npm ci

      - name: Typecheck
        working-directory: apps/widget-bacon-trail
        run: npm run typecheck

      - name: Test
        working-directory: apps/widget-bacon-trail
        run: npm run test

      - name: Build widget bundle
        working-directory: apps/widget-bacon-trail
        env:
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
          # Optional — widget degrades gracefully if unset (no play
          # counters recorded). Populate after deploying the logPlay
          # Cloud Function.
          VITE_STATS_ENDPOINT: ${{ secrets.VITE_STATS_ENDPOINT }}
        run: npm run build

      - name: Report bundle size
        working-directory: apps/widget-bacon-trail
        run: |
          JS_SIZE=$(wc -c < ../../widget-bacon-trail/widget.js)
          CSS_SIZE=$(wc -c < ../../widget-bacon-trail/widget.css)
          JS_GZ=$(gzip -c ../../widget-bacon-trail/widget.js | wc -c)
          CSS_GZ=$(gzip -c ../../widget-bacon-trail/widget.css | wc -c)
          echo "### Widget bundle size" >> $GITHUB_STEP_SUMMARY
          echo "| File | Bytes | Gzipped |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---:|---:|" >> $GITHUB_STEP_SUMMARY
          printf "| widget.js | %d | %d |\n" "$JS_SIZE" "$JS_GZ" >> $GITHUB_STEP_SUMMARY
          printf "| widget.css | %d | %d |\n" "$CSS_SIZE" "$CSS_GZ" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Budget: JS ≤ 150 KB gz, CSS ≤ 20 KB gz." >> $GITHUB_STEP_SUMMARY
          # Fail if either exceeds budget.
          if [[ "$JS_GZ" -gt 153600 ]]; then
            echo "::error::widget.js gzip size ($JS_GZ) exceeds 150 KB budget." >&2
            exit 1
          fi
          if [[ "$CSS_GZ" -gt 20480 ]]; then
            echo "::error::widget.css gzip size ($CSS_GZ) exceeds 20 KB budget." >&2
            exit 1
          fi

      - name: Commit + push if bundle changed
        run: |
          if [[ -z "$(git status --porcelain widget-bacon-trail/)" ]]; then
            echo "No bundle changes."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add widget-bacon-trail/
          git commit -m "chore(widget): rebuild bundle $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Retry push — another bot job (refresh-bacon-shards, rebuild-hub,
          # track-traffic) may have pushed first while we were building.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected on attempt $attempt; rebasing onto remote main and retrying..."
            git pull --rebase origin main
            sleep $((attempt * 3))
          done
          echo "::error::Failed to push after 5 attempts."
          exit 1
