name: Rebuild hub

on:
  push:
    branches: [main]
    paths:
      - 'content/site.json'
      - 'scripts/render-hub.py'
      - '.github/workflows/rebuild-hub.yml'
  workflow_dispatch:

concurrency:
  group: rebuild-hub
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    # Don't re-trigger when our own bot-authored commit lands.
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full token + same branch so we can push the rebuilt index.html back
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Render index.html from content/site.json
        run: python3 scripts/render-hub.py

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain index.html)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit + push rebuilt index.html
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "hub: rebuild index.html from site.json

          Triggered by commit ${{ github.sha }}"
          # Retry push — another bot job (build-widget, refresh-bacon-shards,
          # track-traffic) may have pushed first while we were rendering.
          for attempt in 1 2 3 4 5; do
            if git push origin main; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected on attempt $attempt; rebasing onto remote main and retrying..."
            git pull --rebase origin main
            sleep $((attempt * 3))
          done
          echo "::error::Failed to push after 5 attempts."
          exit 1

      - name: Summary
        run: |
          if [ "${{ steps.changes.outputs.changed }}" = "true" ]; then
            echo "✅ index.html rebuilt + pushed — GitHub Pages will redeploy." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✅ index.html already matched site.json — nothing to do." >> "$GITHUB_STEP_SUMMARY"
          fi
