name: Refresh Bacon Shards

on:
  schedule:
    # 06:00 UTC daily (01:00 CST / 02:00 CDT in Fort Worth).
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: refresh-bacon-shards
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    # Don't re-trigger when our own bot commits. Same pattern as
    # rebuild-hub.yml + track-traffic.yml.
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install firebase-admin
        run: npm install --no-save firebase-admin@^12

      - name: Write service account key
        run: |
          mkdir -p /tmp
          echo '${{ secrets.FIREBASE_SA_JSON }}' > /tmp/sa.json
          # Minimal sanity check: must start with `{` and contain `"type":"service_account"`.
          head -c 1 /tmp/sa.json | grep -q '{' || { echo 'FIREBASE_SA_JSON missing or malformed'; exit 1; }
          grep -q '"type": *"service_account"' /tmp/sa.json || { echo 'FIREBASE_SA_JSON is not a service account JSON'; exit 1; }

      - name: Refresh shards from Firestore
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: node scripts/refresh-bacon-shards.mjs

      - name: Commit + push if changed
        run: |
          if [[ -n "$(git status --porcelain apps/widget-bacon-trail/data/ widget-bacon-trail/data/)" ]]; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add apps/widget-bacon-trail/data/ widget-bacon-trail/data/
            git commit -m "chore(bacon-shards): refresh $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No data drift."
          fi

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/sa.json
