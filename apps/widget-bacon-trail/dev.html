<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Birthday Bacon Trail — dev</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f1f31;
        font-family: system-ui, sans-serif;
        color: #e6edf3;
      }
      #bacon-widget {
        width: 400px;
        min-height: 600px;
        border: 1px dashed rgba(255,255,255,0.1);
        border-radius: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <div id="bacon-widget"></div>
    </main>
    <script type="module" src="/src/index.tsx"></script>
    <script>
      // Mount after the bundle registers itself on window.
      window.addEventListener('load', () => {
        if (window.BaconTrailWidget) {
          window.BaconTrailWidget.init({
            container: document.getElementById('bacon-widget'),
            ctaUrl: 'https://626labs.dev/#work',
            ctaLabel: 'See the full suite →',
          });
        }
      });
    </script>
  </body>
</html>
